<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

<body>
  <nav class="navbar navbar-expand-sm" role="navigation">
    <div class="container justify-content-start">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand ml-3 ml-md-0 mr-md-3" href="/">
        <img src="/images/app-logo.svg" width="30" height="30" class="d-inline-block align-top" alt="">
        SeriesGuide
      </a>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link {% if "/whypay" == page.url %}active{% endif %}" href="/whypay">Support the app</a>
          </li>
  			  
          <li class="nav-item">
            <a class="nav-link {% if page.url contains "/help" %}active{% endif %}" href="/help">Help</a>
          </li>

  			  <li class="nav-item d-sm-none d-lg-block">
            <a class="nav-link {% if "/privacy" == page.url %}active{% endif %}" href="/privacy">Privacy</a>
          </li>

  			  <li class="nav-item d-sm-none d-lg-block">
            <a class="nav-link {% if "/api/" == page.url %}active{% endif %}" href="/api">Extensions API</a>
          </li>

          <li class="nav-item d-sm-none d-lg-block">
            <a class="nav-link" href="{{ site.data.links.community }}">Community</a>
          </li>
          
          <li class="nav-item dropdown d-none d-sm-block d-lg-none">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              More
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="nav-link {% if "/privacy" == page.url %}active{% endif %}" href="/privacy">Privacy</a></li>
              <li><a class="nav-link {% if "/api/" == page.url %}active{% endif %}" href="/api">Extensions API</a></li>
              <li><a class="nav-link" href="{{ site.data.links.community }}">Community</a></li>
            </ul>
          </li>
  			</ul>
      </div>
    </div>
  </nav> <!-- navbar -->

  <div id="content" class="container mt-3">
    {{ content }}
  </div> <!-- container -->
    
  {% include footer.html %}

</body>

</html>
