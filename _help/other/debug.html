title: "View and send debug log"
---

<p><span class="badge badge-info">Applies to SeriesGuide 2025.3 or newer</span></p>

<p>To view the debug log, in <strong>More > Settings</strong> select <strong>Debug log</strong>.</p>

<p>To share the debug log, select <strong>Save</strong> to store a debug log file. Then, for example, <a href="mailto:support@seriesgui.de">email the file to me</a>.</p>
